<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Settings - CogniPath</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"></head><body>
<header class="site-header"><div class="shell nav"><a class="brand" href="dashboard.html"><span class="brand-mark">C</span><span>CogniPath<small data-user-name>User</small></span></a><nav class="nav-links"><a data-nav href="dashboard.html">Dashboard</a><a data-nav href="profile.html">Profile</a><a data-nav href="analytics.html">Analytics</a><a data-nav href="reports.html">Reports</a><a data-nav href="admin.html">Admin</a><a data-nav href="settings.html">Settings</a><a data-nav href="contact.html">Contact</a></nav><button class="btn small" data-logout>Logout</button></div></header>
<div class="app-layout"><aside class="sidebar"><nav class="side-nav"><a data-nav href="settings.html">Preferences</a><a href="#security">Security</a><a href="#privacy">Privacy</a></nav></aside><main class="main">
<div class="page-title"><div><span class="eyebrow">Settings</span><h1>Workspace preferences</h1></div></div>
<form class="glass card" data-settings-form><div class="form-grid"><div class="field"><label>Theme</label><select name="theme"><option>Dark</option><option>System</option><option>High Contrast</option></select></div><div class="field"><label>Language</label><select name="language"><option>English</option><option>Hindi</option><option>Spanish</option><option>French</option></select></div><div class="field" id="privacy"><label>Privacy</label><select name="privacy"><option>Standard</option><option>Strict</option><option>Analytics Only</option></select></div><div class="field" id="security"><label>Security</label><input value="Local demo session with password validation" disabled></div></div><p><label><input type="checkbox" name="email"> Email notifications</label></p><p><label><input type="checkbox" name="product"> Product update notifications</label></p><button class="btn primary" type="submit">Save Settings</button></form>
</main></div><script src="js/app.js"></script><script src="js/settings.js"></script></body></html>
