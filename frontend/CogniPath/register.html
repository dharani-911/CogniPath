<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Register - CogniPath</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/auth.css"></head><body>
<main class="auth-page"><section class="auth-card glass"><div class="auth-art"><a class="brand" href="index.html"><span class="brand-mark">C</span><span>CogniPath<small>Create Workspace</small></span></a><div><span class="eyebrow">Milestone 1</span><h1>User authentication and session management.</h1><p>Create a local demo account with validation, security question recovery, remember-me session, and profile setup.</p></div></div>
<form class="auth-form" data-register-form><h2>Create account</h2><div class="form-grid"><div class="field"><label>Full name</label><input name="name" required placeholder="Priya Menon"></div><div class="field"><label>Email</label><input name="email" type="email" required placeholder="you@example.com"></div></div><div class="field"><label>Password</label><input data-password name="password" type="password" required placeholder="8+ chars, number, symbol"><div class="password-meter" data-score="0"><i></i><i></i><i></i><i></i></div></div><div class="field"><label>Security question</label><select name="question" required><option value="">Select a question</option><option>What is your favorite project?</option><option>What city were you born in?</option><option>What was your first school?</option></select></div><div class="field"><label>Security answer</label><input name="answer" required placeholder="Used for password reset"></div><label class="hint"><input name="remember" type="checkbox" checked> Keep me signed in</label><p class="error"></p><button class="btn primary" type="submit">Create account</button><p class="muted">Already registered? <a href="login.html">Login</a></p></form></section></main>
<script src="js/app.js"></script><script src="js/auth.js"></script></body></html>
